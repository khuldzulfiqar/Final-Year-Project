<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — MindBridge</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">Mind<span>Bridge</span></a>
  <div class="nav-links" id="dynamic-nav"></div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Step 1: Enter email -->
    <div id="step-email">
      <div style="text-align:center; margin-bottom:2rem;">
        <div style="font-size:3rem; margin-bottom:0.75rem;">🔐</div>
        <h2 class="auth-title">Forgot Password?</h2>
        <p class="auth-subtitle">Enter your registered email and we'll send you a reset link</p>
      </div>
      <div id="email-alert" class="alert-box"></div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="reset-email" class="form-control" placeholder="you@example.com"
          onkeydown="if(event.key==='Enter') sendResetEmail()">
      </div>
      <button class="btn-submit" id="send-btn" onclick="sendResetEmail()">Send Reset Link</button>
      <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem;">
        <a href="/login" class="form-link">← Back to Login</a>
      </p>
    </div>

    <!-- Step 2: Success message -->
    <div id="step-success" style="display:none; text-align:center;">
      <div style="font-size:3.5rem; margin-bottom:1rem;">📧</div>
      <h2 class="auth-title">Check Your Email</h2>
      <p style="color:var(--text-muted); font-size:0.9rem; line-height:1.7; margin-bottom:1.5rem;">
        We've sent a password reset link to<br>
        <strong id="sent-to-email" style="color:var(--teal);"></strong>
      </p>
      <div style="background:rgba(13,115,119,0.06); border:1px solid rgba(13,115,119,0.15); border-radius:12px; padding:1rem; font-size:0.82rem; color:var(--text-muted); margin-bottom:1.5rem; line-height:1.6;">
        📌 The link expires in <strong>1 hour</strong>.<br>
        Check your spam folder if you don't see it.
      </div>
      <button onclick="resendEmail()" class="btn-submit" style="background:transparent; color:var(--teal); border:1.5px solid var(--teal);">Resend Email</button>
      <p style="margin-top:1rem; font-size:0.875rem;"><a href="/login" class="form-link">← Back to Login</a></p>
    </div>

  </div>
</div>

<script src="/js/app.js"></script>
<script>
let lastEmail = '';

async function sendResetEmail() {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) { showAlert('email-alert', 'Please enter your email address.', 'error'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Sending...';

  try {
    const data = await apiCall('/api/password/forgot', 'POST', { email });
    if (data.success) {
      lastEmail = email;
      document.getElementById('sent-to-email').textContent = email;
      document.getElementById('step-email').style.display = 'none';
      document.getElementById('step-success').style.display = 'block';
    } else {
      showAlert('email-alert', data.message || 'Something went wrong.', 'error');
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  } catch(e) {
    showAlert('email-alert', 'Server error. Please try again.', 'error');
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
}

async function resendEmail() {
  if (!lastEmail) return;
  document.getElementById('reset-email').value = lastEmail;
  document.getElementById('step-success').style.display = 'none';
  document.getElementById('step-email').style.display = 'block';
  await sendResetEmail();
}
</script>
</body>
</html>
