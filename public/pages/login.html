<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MindBridge</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">Mind<span>Bridge</span></a>
  <div class="nav-links" id="dynamic-nav"></div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your MindBridge account</p>
    </div>
    <div id="login-alert" class="alert-box"></div>
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" id="login-email" class="form-control" placeholder="you@example.com"
        onkeydown="if(event.key==='Enter') login()">
    </div>
    <div class="mb-4">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.4rem;">
        <label class="form-label" style="margin-bottom:0;">Password</label>
        <a href="/forgot-password" class="form-link" style="font-size:0.8rem;">Forgot password?</a>
      </div>
      <div style="position:relative;">
        <input type="password" id="login-password" class="form-control" placeholder="Enter your password"
          onkeydown="if(event.key==='Enter') login()">
        <button type="button" onclick="togglePwd()"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-muted);">👁</button>
      </div>
    </div>
    <button class="btn-submit" id="login-btn" onclick="login()">Sign In</button>
    <p class="auth-footer">
      Don't have an account?
      <a href="/register" class="form-link">Register as Patient</a> or
      <a href="/register-psychiatrist" class="form-link">Register as Psychiatrist</a>
    </p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
if (Auth.isLoggedIn()) window.location.href = '/dashboard';

function togglePwd() {
  const input = document.getElementById('login-password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  if (!email || !password) { showAlert('login-alert', 'Please enter email and password.', 'error'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  try {
    const data = await apiCall('/api/auth/login', 'POST', { email, password });
    if (data.success) {
      Auth.setAuth(data.token, data.user);
      showToast('Welcome back! 👋', 'success');
      setTimeout(() => {
  if (data.user.role === 'admin') {
    window.location.href = '/admin/admin-dashboard.html';
  } 
  else if (data.user.role === 'psychiatrist') {
    window.location.href = '/psychiatrist-dashboard.html';
  } 
  else {
    window.location.href = '/dashboard';
  }
}, 800);
    } else {
      showAlert('login-alert', data.message || 'Login failed.', 'error');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  } catch(e) {
    showAlert('login-alert', 'Server error. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
