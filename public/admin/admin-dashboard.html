<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="../css/admin-css/admin-dashboard.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>Admin Panel</h2>

        <ul>

            <li><a href="/admin/admin-dashboard.html" class="active">Dashboard</a></li>

            <li><a href="/admin/manage-patients.html">Manage Patients</a></li>

            <li><a href="/admin/manage-psychiatrists.html">ManagePsychiatrists</a></li>

            <li><a href="admin/manage-appointments.html">Manage Appointments</a></li>

            <li><a href="/admin/manage-reviews.html">Manage Reviews</a></li>

            <li><button onclick="logout()">Logout</button></li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <h1>Admin Dashboard</h1>

        <div class="cards">

            <div class="card">
                <h3>Total Patients</h3>
                <p id="patientsCount">0</p>
            </div>

            <div class="card">
                <h3>Total Psychiatrists</h3>
                <p id="psychiatristsCount">0</p>
            </div>

            <div class="card">
                <h3>Total Appointments</h3>
                <p id="appointmentsCount">0</p>
            </div>

            <div class="card">
                <h3>Total Reviews</h3>
                <p id="reviewsCount">0</p>
            </div>

        </div>

    </div>

</div>

<script src="../js/admin-dashboard.js"></script>

</html>
