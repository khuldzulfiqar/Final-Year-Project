<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Appointments</title>
  <link rel="stylesheet" href="/css/admin-css/admin-dashboard.css">
  
</head>

<body>

<div class="admin-container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li><a href="/admin/admin-dashboard.html">Dashboard</a></li>
      <li><a href="/admin/manage-patients.html">Manage Patients</a></li>
      <li><a href="/admin/manage-psychiatrists.html">Manage Psychiatrists</a></li>
      <li><a href="/admin/manage-appointments.html" class="active">ManageAppointments</a></li>
       <li><a href="/admin/manage-reviews.html">Manage Reviews</a></li>

            <li><button onclick="logout()">Logout</button></li>
    </ul>
  </div>

  <!-- Content -->
  <div class="content">

    <h1>Manage Appointments</h1>

    <!-- Search + Filter -->
    <div class="top-bar">
      <input type="text" id="searchInput" placeholder="Search appointment...">

      <select id="statusFilter">
        <option value="">All</option>
        <option value="Pending">Pending</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
      </select>
    </div>

    <!-- Table -->
    <table id="appointmentTable">
      <thead>
        <tr>
          <th>Patient</th>
          <th>Psychiatrist</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</div>

<script src="../js/manage-appointment.js"></script>

</body>
</html>
